<?xml version="1.0" encoding="UTF-8"?>
<svg width="1320" height="260" viewBox="0 0 1320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RTD OEM Tweaks Banner</title>
