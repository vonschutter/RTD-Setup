      <stop offset="1" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cc7ff"/>
      <stop offset="1" stop-color="#a8e6cf"/>
